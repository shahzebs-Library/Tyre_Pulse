openapi: 3.0.3
info:
  title: TyrePulse API
  version: 0.1.0
  description: >
    Versioned Go API for TyrePulse (Phase A). The API verifies Supabase-issued
    JWTs and owns authorization. Only foundation endpoints exist today; domain
    modules are added as each is migrated off direct Supabase access.
servers:
  - url: /api/v1
    description: Version 1
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase-issued access token (Phase A).
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
          example: unauthorized
        message:
          type: string
          example: Authentication required.
    Envelope:
      type: object
      properties:
        data: {}
        error:
          $ref: '#/components/schemas/Error'
        meta: {}
    Profile:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        full_name: { type: string }
        username: { type: string }
        role: { type: string, example: inspector }
        site: { type: string }
        country:
          type: array
          items: { type: string }
        approved: { type: boolean }
        locked: { type: boolean }
    Asset:
      type: object
      properties:
        id: { type: string, format: uuid }
        asset_no: { type: string }
        fleet_number: { type: string }
        make: { type: string }
        model: { type: string }
        vehicle_type: { type: string }
        site: { type: string }
        country: { type: string }
        status: { type: string }
        is_active: { type: boolean }
        current_km: { type: number }
        tyre_size: { type: string }
        created_at: { type: string, format: date-time }
    AssetPage:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Asset' }
        next_cursor:
          type: string
          description: Opaque keyset cursor; omitted on the last page.
paths:
  /health:
    get:
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: Process is up
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
  /readyz:
    get:
      summary: Readiness probe (checks database)
      security: []
      responses:
        '200': { description: Ready }
        '503': { description: A dependency is not ready }
  /me:
    get:
      summary: Authenticated user's authoritative profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The caller's profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Profile' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '403':
          description: Account locked or not approved
        '404':
          description: Profile not found
  /assets:
    get:
      summary: List fleet assets (scope-aware, cursor-paginated)
      description: >
        Returns assets the caller is permitted to see. Elevated roles
        (admin/manager/director) see all; others are restricted to their
        country scope. Backed by vehicle_fleet in Phase A.
      security:
        - bearerAuth: []
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 50, maximum: 200 } }
        - { name: cursor, in: query, schema: { type: string } }
        - { name: site, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
        - { name: q, in: query, schema: { type: string }, description: matches asset_no/make/model }
      responses:
        '200':
          description: A page of assets
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/AssetPage' }
        '401': { description: Missing or invalid token }
        '403': { description: Account locked or not approved }
  /assets/{id}:
    get:
      summary: Get a single asset by id (scope-aware)
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: The asset
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Asset' }
        '401': { description: Missing or invalid token }
        '404': { description: Not found or out of scope }
