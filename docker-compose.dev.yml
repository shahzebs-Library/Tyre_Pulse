# Local development stack for the TyrePulse Go backend.
# Brings up the API alongside Postgres, MinIO (private object storage), Redis,
# and Mailhog. This is for LOCAL dev only — production uses managed services
# and secrets injected by the platform, never committed values.
#
#   docker compose -f docker-compose.dev.yml up --build
#
services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/tyrepulse?sslmode=disable"
      SUPABASE_JWT_SECRET: "${SUPABASE_JWT_SECRET:-local-dev-secret-change-me}"
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:5174"
      REDIS_URL: "redis://redis:6379/0"
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tyrepulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
  miniodata:
