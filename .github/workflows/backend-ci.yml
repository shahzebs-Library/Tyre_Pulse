name: Backend CI (Go)

# Builds, vets, and tests the Go API in backend/ on PRs/pushes that touch it.
on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: build · vet · test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Download modules
        working-directory: backend
        run: go mod download

      - name: Vet
        working-directory: backend
        run: go vet ./...

      - name: Build
        working-directory: backend
        run: go build ./...

      - name: Test
        working-directory: backend
        run: go test ./... -count=1
