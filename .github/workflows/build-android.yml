name: Build Android APK

# APK builds consume the limited EAS Free-plan monthly Android quota, so they are
# NOT run on every push. Trigger manually (Actions -> Run workflow) or by pushing
# a release tag like `mobile-v1.2.0`.
on:
  workflow_dispatch:
  push:
    tags:
      - 'mobile-v*'

jobs:
  build:
    name: Build Android Preview APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        working-directory: mobile
        run: eas build --platform android --profile preview --non-interactive
