openapi: 3.0.3
info:
  title: TyrePulse API
  version: 0.1.0
  description: >
    Versioned Go API for TyrePulse (Phase A). The API verifies Supabase-issued
    JWTs and owns authorization. Only foundation endpoints exist today; domain
    modules are added as each is migrated off direct Supabase access.
servers:
  - url: /api/v1
    description: Version 1
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase-issued access token (Phase A).
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
          example: unauthorized
        message:
          type: string
          example: Authentication required.
    Envelope:
      type: object
      properties:
        data: {}
        error:
          $ref: '#/components/schemas/Error'
        meta: {}
    Profile:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        full_name: { type: string }
        username: { type: string }
        role: { type: string, example: inspector }
        site: { type: string }
        country:
          type: array
          items: { type: string }
        approved: { type: boolean }
        locked: { type: boolean }
paths:
  /health:
    get:
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: Process is up
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
  /readyz:
    get:
      summary: Readiness probe (checks database)
      security: []
      responses:
        '200': { description: Ready }
        '503': { description: A dependency is not ready }
  /me:
    get:
      summary: Authenticated user's authoritative profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The caller's profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Profile' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '403':
          description: Account locked or not approved
        '404':
          description: Profile not found
