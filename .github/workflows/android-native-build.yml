name: Android (native) build & test

# Builds and tests the native Kotlin app in android/. Runs on PRs and pushes
# that touch android/ (or this workflow), and on manual dispatch. GitHub's
# ubuntu runners ship the Android SDK, so this verifies the app actually
# compiles — the sandbox that authored it could not reach the SDK.
on:
  push:
    paths:
      - 'android/**'
      - '.github/workflows/android-native-build.yml'
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android-native-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Assemble debug + unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        working-directory: android
        run: ./gradlew test --no-daemon --stacktrace

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tyrepulse-inspector-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
