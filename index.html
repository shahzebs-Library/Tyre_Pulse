<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <title>TyrePulse — Fleet Intelligence Platform</title>
    <meta name="description" content="Enterprise fleet tyre management, AI-powered analytics, and operational intelligence platform." />
    <meta name="keywords" content="tyre management, fleet intelligence, tyre inspection, CPK, fleet analytics" />
    <meta name="author" content="TyrePulse" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- ── PWA / Theme ──────────────────────────────────────────────────────── -->
    <meta name="theme-color" content="#1e3a5f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#1e3a5f" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme" content="dark light" />
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Favicon ──────────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96"  href="/icons/icon-96x96.png" />
    <link rel="icon" type="image/png" sizes="32x32"  href="/icons/icon-96x96.png" />

    <!-- ── Apple / iOS ──────────────────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TyrePulse" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />

    <!-- Apple splash screens — iPhone SE, X/XS, XR, 11, 12/13/14, 15 Pro Max -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" href="/icons/icon-512x512.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" href="/icons/icon-512x512.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" href="/icons/icon-512x512.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" href="/icons/icon-512x512.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2)" href="/icons/icon-512x512.png" />

    <!-- ── Windows / Microsoft ──────────────────────────────────────────────── -->
    <meta name="msapplication-TileColor" content="#0f172a" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- ── Open Graph ───────────────────────────────────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="TyrePulse Fleet Intelligence" />
    <meta property="og:description" content="Enterprise fleet tyre management and AI intelligence platform" />
    <meta property="og:image"       content="/icons/icon-512x512.png" />

    <!-- ── Theme: apply before render to avoid flash ────────────────────────── -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('tyrepulse-theme') || 'dark';
          document.documentElement.classList.add(t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Service worker is registered by vite-plugin-pwa (injected at build time) -->
  </body>
</html>
