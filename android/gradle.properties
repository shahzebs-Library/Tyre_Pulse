org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.caching=true
org.gradle.configuration-cache=true
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# ──────────────────────────────────────────────────────────────────────────────
# App configuration. Real values belong in android/local.properties (gitignored)
# or CI secrets — NOT here. The anon key is RLS-protected but still must not be
# committed. These empty defaults let the project build; the app shows a
# "not configured" state until they are supplied.
#   tyrepulse.supabaseUrl=https://YOUR_REF.supabase.co
#   tyrepulse.supabaseAnonKey=your-anon-key
#   tyrepulse.apiBaseUrl=http://10.0.2.2:8080   # Go API (emulator -> host)
# ──────────────────────────────────────────────────────────────────────────────
tyrepulse.supabaseUrl=
tyrepulse.supabaseAnonKey=
tyrepulse.apiBaseUrl=
